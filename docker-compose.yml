services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quiz
      POSTGRES_DB: quiz
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz -d quiz"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://quiz:quiz@postgres:5432/quiz
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      # NEXT_PUBLIC_API_URL is baked in at build time — points to wherever
      # the backend is reachable FROM THE BROWSER (not inside Docker).
      # Change this to your server's public address when deploying.
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
